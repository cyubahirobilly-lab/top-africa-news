version: '3.9'
services:
  backend:
    image: node:20-alpine
    working_dir: /app/backend
    command: sh -c "npm install && npm run dev"
    volumes:
      - .:/app
    ports:
      - "5000:5000"
  frontend:
    image: node:20-alpine
    working_dir: /app/frontend
    command: sh -c "npm install && npm run dev"
    volumes:
      - .:/app
    ports:
      - "3000:3000"
